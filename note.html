<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>装修管家 - 注意事项</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css">
  <link rel="stylesheet" href="css/shared.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="js/shared-config.js"></script>
</head>
<body class="bg-neutral-50 text-neutral-800 min-h-screen no-select">
  <div class="flex flex-col min-h-screen">
    <!-- 导航栏 -->
    <header class="bg-white border-b border-neutral-200 sticky top-0 z-30">
      <div class="container mx-auto px-4 py-3 flex justify-between items-center">
        <div class="flex items-center space-x-2">
          <i class="fa fa-home text-primary text-2xl"></i>
          <h1 class="text-xl font-bold text-neutral-800">装修管家</h1>
        </div>

        <div class="flex items-center space-x-4">
          <a href="cost.html" class="px-4 py-2 rounded-lg bg-white text-primary border border-primary font-medium hover:bg-primary/5 transition-colors">支出记录</a>
          <a href="note.html" class="px-4 py-2 rounded-lg bg-primary text-white font-medium hover:bg-primary/90 transition-colors">注意事项</a>
          <button class="text-neutral-500 hover:text-neutral-700 p-2 rounded-full hover:bg-neutral-100 transition-colors">
            <i class="fa fa-question-circle"></i>
          </button>
        </div>
      </div>
    </header>

    <!-- 主要内容 -->
    <main class="flex-grow container mx-auto px-4 py-6 no-select">
      <!-- 注意事项模块 -->
      <div id="noteModule" class="module-container">
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-4">
          <!-- 左侧：添加注意事项表单 -->
          <div class="lg:col-span-3 lg:pr-4">
            <div class="bg-white rounded-xl p-5 card-shadow hover-lift transition-all duration-300">
              <h2 class="text-lg md:text-xl font-semibold mb-4 flex items-center text-neutral-700">
                <i class="fa fa-plus-circle text-primary mr-2"></i>添加注意事项
              </h2>

              <form id="noteForm" class="space-y-4">
                <div>
                  <label for="noteTitle" class="block text-sm font-medium text-neutral-600 mb-1">主题</label>
                  <input type="text" id="noteTitle" placeholder="请输入注意事项主题"
                    class="w-full px-3 py-2 border border-neutral-300 rounded-lg input-focus transition-all">
                </div>

                <div>
                  <label for="notePhase" class="block text-sm font-medium text-neutral-600 mb-1">装修阶段</label>
                  <select id="notePhase" class="w-full px-3 py-2 border border-neutral-300 rounded-lg input-focus transition-all">
                    <option value="设计阶段">设计阶段</option>
                    <option value="拆除阶段">拆除阶段</option>
                    <option value="水电改造">水电改造</option>
                    <option value="泥瓦工程">泥瓦工程</option>
                    <option value="木工工程">木工工程</option>
                    <option value="油漆工程">油漆工程</option>
                    <option value="安装阶段">安装阶段</option>
                    <option value="验收阶段">验收阶段</option>
                    <option value="软装阶段">软装阶段</option>
                    <option value="其他">其他</option>
                  </select>
                </div>

                <div>
                  <label for="noteStatus" class="block text-sm font-medium text-neutral-600 mb-1">状态</label>
                  <select id="noteStatus" class="w-full px-3 py-2 border border-neutral-300 rounded-lg input-focus transition-all">
                    <option value="待处理" selected>待处理</option>
                    <option value="处理中">处理中</option>
                    <option value="已完成">已完成</option>
                    <option value="已取消">已取消</option>
                  </select>
                </div>

                <div>
                  <label for="noteLocation" class="block text-sm font-medium text-neutral-600 mb-1">区域</label>
                  <select id="noteLocation" class="w-full px-3 py-2 border border-neutral-300 rounded-lg input-focus transition-all">
                    <option value="客厅">客厅</option>
                    <option value="厨房">厨房</option>
                    <option value="主卧">主卧</option>
                    <option value="衣帽间">衣帽间</option>
                    <option value="书房">书房</option>
                    <option value="主卫">主卫</option>
                    <option value="次卫">次卫</option>
                    <option value="家政间">家政间</option>
                    <option value="全屋">全屋</option>
                    <option value="其他">其他</option>
                  </select>
                </div>

                <div>
                  <label for="notePriority" class="block text-sm font-medium text-neutral-600 mb-1">优先级</label>
                  <select id="notePriority" class="w-full px-3 py-2 border border-neutral-300 rounded-lg input-focus transition-all">
                    <option value="低">低</option>
                    <option value="中" selected>中</option>
                    <option value="高">高</option>
                    <option value="紧急">紧急</option>
                  </select>
                </div>

                <div>
                  <label for="noteDescription" class="block text-sm font-medium text-neutral-600 mb-1">详述</label>
                  <textarea id="noteDescription" rows="4" placeholder="请输入详细描述..."
                    class="w-full px-3 py-2 border border-neutral-300 rounded-lg input-focus transition-all"></textarea>
                </div>

                <div>
                  <label for="noteDate" class="block text-sm font-medium text-neutral-600 mb-1">记录日期</label>
                  <input type="date" id="noteDate"
                    class="w-full px-3 py-2 border border-neutral-300 rounded-lg input-focus transition-all">
                </div>

                <div>
                  <label class="block text-sm font-medium text-neutral-600 mb-1">图片（选择文件或粘贴）</label>
                  <div class="flex gap-2">
                    <button type="button" id="selectImageButton" class="bg-primary hover:bg-primary/90 text-white px-4 py-2 rounded-lg transition-colors flex items-center justify-center whitespace-nowrap">
                      <i class="fa fa-upload mr-2"></i>选择图片文件
                    </button>
                    <div id="imageUploadArea" class="flex-1 border-2 border-dashed border-neutral-300 rounded-lg p-4 text-center bg-neutral-50 cursor-text hover:border-primary transition-colors relative">
                      <input type="file" id="imageInput" accept="image/*" class="hidden">
                      <i class="fa fa-paste text-neutral-400 text-xl mb-2"></i>
                      <p class="text-sm text-neutral-500">点击或按Ctrl+V粘贴图片</p>
                      <p id="imagePreviewText" class="text-xs text-neutral-400 mt-1 hidden">图片已添加</p>
                      <button id="deleteImageButton" class="absolute top-2 right-2 text-neutral-500 hover:text-danger p-1 rounded-full hover:bg-neutral-100 transition-colors hidden">
                        <i class="fa fa-times"></i>
                      </button>
                    </div>
                  </div>
                  <input type="hidden" id="imageUrl" value="">
                </div>

                <button type="submit" class="w-full bg-primary hover:bg-primary/90 text-white font-medium py-2.5 px-4 rounded-lg transition-all flex items-center justify-center transform hover:translate-y-[-1px] active:translate-y-0 shadow-md hover:shadow-lg">
                  <i class="fa fa-save mr-2"></i>保存记录
                </button>
              </form>
            </div>
          </div>

          <!-- 右侧：注意事项列表 -->
          <div class="lg:col-span-9">
            <div class="bg-white rounded-xl p-5 card-shadow hover-lift transition-all duration-300 hover:shadow-lg">
              <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-4 gap-3">
                <h2 class="text-lg md:text-xl font-semibold flex items-center text-neutral-700">
                  <i class="fa fa-list-alt text-primary mr-2"></i>注意事项总览
                </h2>

                <div class="w-full sm:w-auto flex flex-col sm:flex-row gap-3">
                  <div class="relative w-full sm:w-auto">
                    <select id="statusFilter" class="w-full sm:w-auto px-3 py-1.5 border border-neutral-300 rounded-lg text-sm input-focus transition-all">
                      <option value="all">全部状态</option>
                      <option value="待处理">待处理</option>
                      <option value="处理中">处理中</option>
                      <option value="已完成">已完成</option>
                      <option value="已取消">已取消</option>
                    </select>
                  </div>

                  <div class="relative w-full sm:w-auto">
                    <select id="phaseFilter" class="w-full sm:w-auto px-3 py-1.5 border border-neutral-300 rounded-lg text-sm input-focus transition-all">
                      <option value="all">全部阶段</option>
                      <option value="设计阶段">设计阶段</option>
                      <option value="拆除阶段">拆除阶段</option>
                      <option value="水电改造">水电改造</option>
                      <option value="泥瓦工程">泥瓦工程</option>
                      <option value="木工工程">木工工程</option>
                      <option value="油漆工程">油漆工程</option>
                      <option value="安装阶段">安装阶段</option>
                      <option value="验收阶段">验收阶段</option>
                      <option value="软装阶段">软装阶段</option>
                      <option value="其他">其他</option>
                      <option value="未分类">未分类</option>
                    </select>
                  </div>

                  <div class="relative w-full sm:w-auto">
                    <select id="priorityFilter" class="w-full sm:w-auto px-3 py-1.5 border border-neutral-300 rounded-lg text-sm input-focus transition-all">
                      <option value="all">全部优先级</option>
                      <option value="低">低</option>
                      <option value="中">中</option>
                      <option value="高">高</option>
                      <option value="紧急">紧急</option>
                    </select>
                  </div>

                  <div class="relative w-full sm:w-auto">
                    <input type="text" id="noteSearchInput" placeholder="搜索注意事项..."
                      class="pl-8 pr-3 py-1.5 border border-neutral-300 rounded-lg text-sm input-focus transition-all w-full">
                    <i class="fa fa-search absolute left-3 top-1/2 transform -translate-y-1/2 text-neutral-400"></i>
                  </div>

                  <div class="flex gap-2">
                    <button type="button" id="importNotesButton" class="px-3 py-1.5 border border-neutral-300 rounded-lg text-sm font-medium hover:bg-neutral-50 transition-colors flex items-center">
                      <i class="fa fa-download mr-1"></i>导入
                    </button>
                    <button type="button" id="exportNotesButton" class="px-3 py-1.5 border border-neutral-300 rounded-lg text-sm font-medium hover:bg-neutral-50 transition-colors flex items-center">
                      <i class="fa fa-upload mr-1"></i>导出
                    </button>
                    <button type="button" id="clearAllNotesButton" class="px-3 py-1.5 border border-red-300 text-red-500 rounded-lg text-sm font-medium hover:bg-red-50 transition-colors flex items-center">
                      <i class="fa fa-trash mr-1"></i>清空所有记录
                    </button>
                  </div>
                </div>
              </div>

              <div id="noteFilterStats" class="mb-4 text-sm text-neutral-500 hidden">
                显示 <span id="noteFilteredCount">0</span> 条记录，其中待处理 <span id="pendingCount">0</span> 条
              </div>

              <div class="overflow-x-auto">
                <table class="w-full min-w-[1000px] divide-y divide-neutral-200">
                  <thead>
                    <tr>
                      <th class="px-2 py-2 bg-neutral-50 text-left text-xs font-medium text-neutral-500 uppercase tracking-wider rounded-tl-lg whitespace-nowrap">主题</th>
                      <th class="px-2 py-2 bg-neutral-50 text-left text-xs font-medium text-neutral-500 uppercase tracking-wider whitespace-nowrap">装修阶段</th>
                      <th class="px-2 py-2 bg-neutral-50 text-left text-xs font-medium text-neutral-500 uppercase tracking-wider whitespace-nowrap">区域</th>
                      <th class="px-2 py-2 bg-neutral-50 text-left text-xs font-medium text-neutral-500 uppercase tracking-wider whitespace-nowrap">优先级</th>
                      <th class="px-2 py-2 bg-neutral-50 text-left text-xs font-medium text-neutral-500 uppercase tracking-wider whitespace-nowrap">状态</th>
                      <th class="px-2 py-2 bg-neutral-50 text-left text-xs font-medium text-neutral-500 uppercase tracking-wider whitespace-nowrap">记录日期</th>
                      <th class="px-2 py-2 bg-neutral-50 text-left text-xs font-medium text-neutral-500 uppercase tracking-wider whitespace-nowrap">描述</th>
                      <th class="px-2 py-2 bg-neutral-50 text-left text-xs font-medium text-neutral-500 uppercase tracking-wider rounded-tr-lg whitespace-nowrap">操作</th>
                    </tr>
                  </thead>
                  <tbody id="noteList" class="bg-white divide-y divide-neutral-200">
                    <tr class="text-center table-row-animate">
                      <td colspan="8" class="px-3 py-8 text-neutral-400">
                        <i class="fa fa-folder-open-o text-2xl mb-2 block"></i>
                        暂无记录，添加您的第一条装修注意事项吧
                      </td>
                    </tr>
                  </tbody>
                </table>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>

    <!-- 编辑注意事项模态框 -->
    <div id="editNoteModal" class="fixed inset-0 bg-black/50 z-50 flex items-center justify-center hidden transition-opacity duration-300">
      <div class="bg-white rounded-xl p-5 max-w-lg w-full mx-4 max-h-[90vh] overflow-y-auto transform transition-all duration-300 scale-95 opacity-0 card-shadow" id="editNoteModalContent">
        <div class="flex justify-between items-center mb-4">
          <h3 class="text-lg font-semibold text-neutral-700">编辑注意事项</h3>
          <button id="closeEditNoteModal" class="text-neutral-400 hover:text-neutral-600 transition-colors">
            <i class="fa fa-times text-lg"></i>
          </button>
        </div>

        <form id="editNoteForm" class="space-y-4">
          <input type="hidden" id="editNoteId" />

          <div>
            <label for="editNoteTitle" class="block text-sm font-medium text-neutral-600 mb-1">主题</label>
            <input type="text" id="editNoteTitle" class="w-full px-3 py-2 border border-neutral-300 rounded-lg input-focus transition-all">
          </div>

          <div>
            <label for="editNotePhase" class="block text-sm font-medium text-neutral-600 mb-1">装修阶段</label>
            <select id="editNotePhase" class="w-full px-3 py-2 border border-neutral-300 rounded-lg input-focus transition-all">
              <option value="设计阶段">设计阶段</option>
              <option value="拆除阶段">拆除阶段</option>
              <option value="水电改造">水电改造</option>
              <option value="泥瓦工程">泥瓦工程</option>
              <option value="木工工程">木工工程</option>
              <option value="油漆工程">油漆工程</option>
              <option value="安装阶段">安装阶段</option>
              <option value="验收阶段">验收阶段</option>
              <option value="软装阶段">软装阶段</option>
              <option value="其他">其他</option>
            </select>
          </div>

          <div>
            <label class="block text-sm font-medium text-neutral-600 mb-1">图片（选择文件或粘贴）</label>
            <div class="flex gap-2">
              <button type="button" id="editSelectImageButton" class="bg-primary hover:bg-primary/90 text-white px-4 py-2 rounded-lg transition-colors flex items-center justify-center whitespace-nowrap">
                <i class="fa fa-upload mr-2"></i>选择图片文件
              </button>
              <div id="editImageUploadArea" class="flex-1 border-2 border-dashed border-neutral-300 rounded-lg p-4 text-center cursor-text hover:border-primary transition-colors relative">
                <input type="file" id="editImageInput" accept="image/*" class="hidden">
                <i class="fa fa-paste text-neutral-400 text-xl mb-2"></i>
                <p class="text-sm text-neutral-500">点击或按Ctrl+V粘贴图片</p>
                <p id="editImagePreviewText" class="text-xs text-neutral-400 mt-1 hidden">图片已添加</p>
                <button id="deleteEditImageButton" class="absolute top-2 right-2 text-neutral-500 hover:text-danger p-1 rounded-full hover:bg-neutral-100 transition-colors hidden">
                  <i class="fa fa-times"></i>
                </button>
              </div>
            </div>
            <input type="hidden" id="editImageUrl" value="">
          </div>

          <div>
            <label for="editNoteStatus" class="block text-sm font-medium text-neutral-600 mb-1">状态</label>
            <select id="editNoteStatus" class="w-full px-3 py-2 border border-neutral-300 rounded-lg input-focus transition-all">
              <option value="待处理">待处理</option>
              <option value="处理中">处理中</option>
              <option value="已完成">已完成</option>
              <option value="已取消">已取消</option>
            </select>
          </div>

          <div>
            <label for="editNoteLocation" class="block text-sm font-medium text-neutral-600 mb-1">区域</label>
            <select id="editNoteLocation" class="w-full px-3 py-2 border border-neutral-300 rounded-lg input-focus transition-all">
              <option value="客厅">客厅</option>
              <option value="厨房">厨房</option>
              <option value="主卧">主卧</option>
              <option value="衣帽间">衣帽间</option>
              <option value="书房">书房</option>
              <option value="主卫">主卫</option>
              <option value="次卫">次卫</option>
              <option value="家政间">家政间</option>
              <option value="全屋">全屋</option>
              <option value="其他">其他</option>
            </select>
          </div>

          <div>
            <label for="editNotePriority" class="block text-sm font-medium text-neutral-600 mb-1">优先级</label>
            <select id="editNotePriority" class="w-full px-3 py-2 border border-neutral-300 rounded-lg input-focus transition-all">
              <option value="低">低</option>
              <option value="中">中</option>
              <option value="高">高</option>
              <option value="紧急">紧急</option>
            </select>
          </div>

          <div>
            <label for="editNoteDescription" class="block text-sm font-medium text-neutral-600 mb-1">详述</label>
            <textarea id="editNoteDescription" rows="4" class="w-full px-3 py-2 border border-neutral-300 rounded-lg input-focus transition-all"></textarea>
          </div>

          <div>
            <label for="editNoteDate" class="block text-sm font-medium text-neutral-600 mb-1">记录日期</label>
            <input type="date" id="editNoteDate" class="w-full px-3 py-2 border border-neutral-300 rounded-lg input-focus transition-all">
          </div>

          <div class="flex justify-end gap-3">
            <button type="button" id="cancelEditNote" class="px-4 py-2 border border-neutral-300 rounded-lg text-neutral-700 font-medium hover:bg-neutral-50 transition-colors">取消</button>
            <button type="submit" class="px-4 py-2 bg-primary hover:bg-primary/90 text-white font-medium rounded-lg transition-colors">保存更改</button>
          </div>
        </form>
      </div>
    </div>

    <!-- 导入文件隐藏输入框 -->
    <input type="file" id="notesFileInput" accept=".json" class="hidden">

    <!-- 图片预览模态框 -->
    <div id="imagePreviewModal" class="fixed inset-0 bg-black/90 z-50 flex items-center justify-center hidden transition-opacity duration-300">
      <button id="closeImagePreview" class="absolute top-4 right-4 bg-black/50 text-white w-8 h-8 rounded-full flex items-center justify-center z-10 hover:bg-black/70 transition-colors">
        <i class="fa fa-times"></i>
      </button>
      <img id="previewImage" src="" alt="预览图片" class="max-w-full max-h-[80vh] object-contain">
    </div>

    <!-- 确认清空注意事项模态框 -->
    <div id="confirmClearNotesModal" class="fixed inset-0 bg-black/50 z-50 flex items-center justify-center hidden transition-opacity duration-300">
      <div class="bg-white rounded-xl p-5 max-w-md w-full mx-4 transform transition-all duration-300 scale-95 opacity-0 card-shadow" id="confirmClearNotesModalContent">
        <div class="text-center mb-4">
          <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-red-100 text-danger mb-4">
            <i class="fa fa-exclamation-triangle text-2xl"></i>
          </div>
          <h3 class="text-xl font-semibold text-red-500 mb-2">确认清空所有记录</h3>
          <p class="text-neutral-600 mb-4">此操作将清空所有注意事项记录，数据将无法恢复，是否确认继续？</p>
          <div class="flex justify-center gap-3">
            <button id="cancelClearNotes" class="px-4 py-2 border border-neutral-300 rounded-lg text-neutral-700 font-medium hover:bg-neutral-50 transition-colors">取消</button>
            <button id="confirmClearNotes" class="px-4 py-2 bg-red-500 text-white font-medium rounded-lg hover:bg-red-600 transition-colors">确认清空</button>
          </div>
        </div>
      </div>
    </div>

    <!-- 确认删除模态框 -->
    <div id="confirmDeleteNoteModal" class="fixed inset-0 bg-black/50 z-50 flex items-center justify-center hidden transition-opacity duration-300">
      <div class="bg-white rounded-xl p-5 max-w-md w-full mx-4 transform transition-all duration-300 scale-95 opacity-0 card-shadow" id="confirmDeleteNoteModalContent">
        <div class="text-center mb-4">
          <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-red-100 text-danger mb-4">
            <i class="fa fa-exclamation-triangle text-2xl"></i>
          </div>
          <h3 class="text-lg font-semibold text-neutral-800">确认删除</h3>
          <p class="text-neutral-500 mt-2">您确定要删除这条注意事项吗？此操作不可撤销。</p>
        </div>
        <div class="flex justify-center gap-3">
          <button type="button" id="cancelDeleteNote" class="px-4 py-2 border border-neutral-300 rounded-lg text-neutral-700 font-medium hover:bg-neutral-50 transition-colors">取消</button>
          <button type="button" id="confirmDeleteNote" class="px-4 py-2 bg-danger hover:bg-danger/90 text-white font-medium rounded-lg transition-colors">删除</button>
        </div>
      </div>
    </div>

    <!-- 页脚 -->
    <footer class="bg-white border-t border-neutral-200 py-4 mt-auto">
      <div class="container mx-auto px-4 text-center text-neutral-500 text-sm">
        <p>装修管家注意事项 &copy; 2024 | 版本号: v2.0.0</p>
      </div>
    </footer>
  </div>

  <script src="js/indexeddb-manager.js"></script>
  <script src="js/api-client.js"></script>
  <script src="js/modal-utils.js"></script>
  <script src="js/image-upload.js"></script>
  <script src="js/notification.js"></script>
  <script src="js/import-export.js"></script>
  <script src="js/app-note.js"></script>
</body>
</html>
