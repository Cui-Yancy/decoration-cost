<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>装修管家 - 首页</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#4f46e5', // 主色调 - 紫色
            secondary: '#8b5cf6', // 辅助色 - 浅紫色
            success: '#10b981', // 成功色 - 绿色
            warning: '#f59e0b', // 警告色 - 黄色
            danger: '#ef4444', // 危险色 - 红色
            neutral: {
              50: '#f9fafb',
              100: '#f3f4f6',
              200: '#e5e7eb',
              300: '#d1d5db',
              400: '#9ca3af',
              500: '#6b7280',
              600: '#4b5563',
              700: '#374151',
              800: '#1f2937',
              900: '#111827',
            }
          },
          fontFamily: {
            sans: ['Inter', 'system-ui', 'sans-serif'],
          },
        },
      }
    }
  </script>
  <style type="text/tailwindcss">
    @layer utilities {
      /* 自定义工具类 */
      .content-auto { content-visibility: auto; }
      .card-shadow {
        box-shadow: 0 1px 2px 0 rgb(0 0 0 / 0.05);
      }
      .card-hover {
        transition: transform 0.2s, box-shadow 0.2s;
      }
      .card-hover:hover {
        transform: translateY(-2px);
        box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
      }
      .hover-lift {
        transition: transform 0.2s, box-shadow 0.2s;
      }
      .hover-lift:hover {
        transform: translateY(-1px);
      }
    }
  </style>
</head>
<body class="bg-gradient-to-br from-amber-50 to-orange-50 text-neutral-800 min-h-screen relative overflow-hidden">
  <!-- 暖色调背景装饰 -->
  <div class="absolute inset-0 z-0">
    <div class="absolute top-0 left-0 w-full h-full opacity-10 bg-[url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI1MCIgaGVpZ2h0PSI1MCIgdmlld0JveD0iMCAwIDUwIDUwIj48ZyBmaWxsPSJub25lIiBmaWxsLXJ1bGU9ImV2ZW5vZGQiPjxwYXRoIGZpbGw9IiNmOWU2YzAiIGQ9Ik0wIDUwSDUwVjBIMHoiLz48cGF0aCBzdHJva2U9IiNlYmNiYSIgc3Ryb2tlLXdpZHRoPSIxIiBkPSJNMTAgMTBtMTAtMXYxTTMwIDEwbTktOXptMS0xIDkgOVYxSDIwTTAgMTBoMXYxMEgweiIvPjxwYXRoIHN0cm9rZT0iI2ViY2JhIiBzdHJva2Utd2lkdGg9IjEiIGQ9Ik01IDVIMHYxSDVWMVY1WiIgLz48L2c+PC9zdmc+')]"></div>
  </div>
  <div class="flex flex-col min-h-screen">
    <!-- 导航栏 -->
    <header class="bg-white border-b border-neutral-200 sticky top-0 z-30">
      <div class="container mx-auto px-4 py-3 flex justify-between items-center">
        <div class="flex items-center space-x-2">
          <i class="fa fa-home text-primary text-2xl"></i>
          <h1 class="text-xl font-bold text-neutral-800">装修管家</h1>
        </div>
        
        <div class="flex items-center space-x-4">
          <a href="cost.html" class="px-4 py-2 rounded-lg bg-white text-primary border border-primary font-medium hover:bg-primary/5 transition-colors">支出记录</a>
          <a href="note.html" class="px-4 py-2 rounded-lg bg-white text-primary border border-primary font-medium hover:bg-primary/5 transition-colors">注意事项</a>
          <button class="text-neutral-500 hover:text-neutral-700 p-2 rounded-full hover:bg-neutral-100 transition-colors">
            <i class="fa fa-question-circle"></i>
          </button>
        </div>
      </div>
    </header>

    <!-- 主要内容 -->
    <main class="flex-grow container mx-auto px-4 py-10 relative z-10">
      <div class="max-w-3xl mx-auto text-center">
        <h2 class="text-[clamp(2rem,5vw,3rem)] font-bold text-neutral-800 mb-4">
          轻松管理装修全流程
        </h2>
        <p class="text-lg text-neutral-600 mb-12">
          记录支出、追踪注意事项，让您的装修过程井然有序
        </p>
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-8 max-w-4xl mx-auto">
          <!-- 支出记录卡片 -->
          <div class="bg-white/90 backdrop-blur-sm rounded-xl p-6 card-shadow card-hover transition-all duration-300 group">
            <div class="w-16 h-16 bg-primary/10 rounded-full flex items-center justify-center mb-4 mx-auto group-hover:bg-primary/20 transition-colors">
              <i class="fa fa-money text-primary text-3xl"></i>
            </div>
            <h3 class="text-xl font-semibold mb-2 text-neutral-800">支出记录</h3>
            <p class="text-neutral-600 mb-6">记录和管理装修过程中的各项支出，轻松掌握预算使用情况</p>
            <a href="cost.html" class="inline-flex items-center px-6 py-3 bg-primary hover:bg-primary/90 text-white font-medium rounded-lg transition-all transform hover:translate-y-[-1px] active:translate-y-0 shadow-md hover:shadow-lg">
              进入支出记录
              <i class="fa fa-arrow-right ml-2"></i>
            </a>
          </div>
          
          <!-- 注意事项卡片 -->
          <div class="bg-white/90 backdrop-blur-sm rounded-xl p-6 card-shadow card-hover transition-all duration-300 group">
            <div class="w-16 h-16 bg-secondary/10 rounded-full flex items-center justify-center mb-4 mx-auto group-hover:bg-secondary/20 transition-colors">
              <i class="fa fa-sticky-note-o text-secondary text-3xl"></i>
            </div>
            <h3 class="text-xl font-semibold mb-2 text-neutral-800">注意事项</h3>
            <p class="text-neutral-600 mb-6">记录装修过程中的重要事项和提醒，确保装修质量和进度</p>
            <a href="note.html" class="inline-flex items-center px-6 py-3 bg-secondary hover:bg-secondary/90 text-white font-medium rounded-lg transition-all transform hover:translate-y-[-1px] active:translate-y-0 shadow-md hover:shadow-lg">
              进入注意事项
              <i class="fa fa-arrow-right ml-2"></i>
            </a>
          </div>
        </div>
      </div>
    </main>

    <!-- 页脚 -->
    <footer class="bg-white border-t border-neutral-200 py-4 mt-auto">
      <div class="container mx-auto px-4 text-center text-neutral-500 text-sm">
        <p>装修管家 © 2024 | 版本号: v1.0.0</p>
      </div>
    </footer>
  </div>
</body>
</html>
