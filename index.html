<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>装修支出管家</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css">
  <link rel="stylesheet" href="css/shared.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="js/shared-config.js"></script>
</head>
<body class="app-surface text-neutral-800 min-h-screen">
  <div class="flex flex-col min-h-screen">
    <header class="bg-white/95 border-b border-neutral-200 sticky top-0 z-30 backdrop-blur">
      <div class="container mx-auto px-4 py-3 flex justify-between items-center">
        <a href="index.html" class="flex items-center gap-2 focus-ring rounded-lg">
          <span class="w-9 h-9 rounded-lg bg-primary text-white flex items-center justify-center">
            <i class="fa fa-home" aria-hidden="true"></i>
          </span>
          <span>
            <span class="block text-lg font-bold text-neutral-900">装修支出管家</span>
            <span class="block text-xs text-neutral-500">预算、采购、安装，一处记录</span>
          </span>
        </a>

        <nav class="flex items-center gap-2" aria-label="主导航">
          <a href="cost.html" class="px-4 py-2 rounded-lg bg-primary text-white font-medium hover:bg-primary/90 transition-colors focus-ring">支出管理</a>
        </nav>
      </div>
    </header>

    <main class="flex-grow container mx-auto px-4 py-8">
      <section class="grid grid-cols-1 lg:grid-cols-[1.1fr_0.9fr] gap-6 items-stretch">
        <div class="bg-white border border-neutral-200 rounded-lg p-6 md:p-8 card-shadow">
          <p class="text-sm font-medium text-primary mb-3">装修支出管理</p>
          <h1 class="text-3xl md:text-4xl font-bold text-neutral-900 mb-4 text-balance">
            把每一笔装修花费记清楚
          </h1>
          <p class="text-neutral-600 leading-7 mb-6 max-w-2xl">
            记录采购、区域、状态、渠道和图片凭证，随时查看总支出、分类占比和待跟进项目。
          </p>
          <div class="flex flex-col sm:flex-row gap-3">
            <a href="cost.html" class="inline-flex items-center justify-center px-5 py-3 rounded-lg bg-primary text-white font-medium hover:bg-primary/90 transition-colors focus-ring">
              进入支出管理
              <i class="fa fa-arrow-right ml-2" aria-hidden="true"></i>
            </a>
            <a href="cost.html#expenseForm" class="inline-flex items-center justify-center px-5 py-3 rounded-lg border border-neutral-300 bg-white text-neutral-700 font-medium hover:bg-neutral-50 transition-colors focus-ring">
              添加支出
            </a>
          </div>
        </div>

        <div class="grid grid-cols-2 gap-3">
          <div class="bg-white border border-neutral-200 rounded-lg p-5 card-shadow">
            <div class="w-10 h-10 rounded-lg bg-primary/10 text-primary flex items-center justify-center mb-4">
              <i class="fa fa-calculator" aria-hidden="true"></i>
            </div>
            <p class="text-sm text-neutral-500">总额统计</p>
            <p class="text-lg font-semibold text-neutral-900 mt-1">自动汇总</p>
          </div>
          <div class="bg-white border border-neutral-200 rounded-lg p-5 card-shadow">
            <div class="w-10 h-10 rounded-lg bg-blue-50 text-blue-600 flex items-center justify-center mb-4">
              <i class="fa fa-pie-chart" aria-hidden="true"></i>
            </div>
            <p class="text-sm text-neutral-500">分类占比</p>
            <p class="text-lg font-semibold text-neutral-900 mt-1">图表查看</p>
          </div>
          <div class="bg-white border border-neutral-200 rounded-lg p-5 card-shadow">
            <div class="w-10 h-10 rounded-lg bg-amber-50 text-amber-600 flex items-center justify-center mb-4">
              <i class="fa fa-truck" aria-hidden="true"></i>
            </div>
            <p class="text-sm text-neutral-500">采购状态</p>
            <p class="text-lg font-semibold text-neutral-900 mt-1">跟进到货</p>
          </div>
          <div class="bg-white border border-neutral-200 rounded-lg p-5 card-shadow">
            <div class="w-10 h-10 rounded-lg bg-rose-50 text-rose-600 flex items-center justify-center mb-4">
              <i class="fa fa-picture-o" aria-hidden="true"></i>
            </div>
            <p class="text-sm text-neutral-500">凭证图片</p>
            <p class="text-lg font-semibold text-neutral-900 mt-1">支持粘贴</p>
          </div>
        </div>
      </section>

      <section class="mt-6 bg-white border border-neutral-200 rounded-lg p-5 card-shadow">
        <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-4">
          <div>
            <h2 class="text-lg font-semibold text-neutral-900">建议工作流</h2>
            <p class="text-sm text-neutral-500 mt-1">先记录加购，再跟进下单、到货、安装和验收。</p>
          </div>
          <div class="flex flex-wrap gap-2 text-sm">
            <span class="px-3 py-1 rounded-full bg-neutral-100 text-neutral-700">已加购</span>
            <span class="px-3 py-1 rounded-full bg-blue-100 text-blue-700">已下单</span>
            <span class="px-3 py-1 rounded-full bg-amber-100 text-amber-700">已到货</span>
            <span class="px-3 py-1 rounded-full bg-green-100 text-green-700">已验收</span>
          </div>
        </div>
      </section>
    </main>

    <footer class="bg-white border-t border-neutral-200 py-4 mt-auto">
      <div class="container mx-auto px-4 text-center text-neutral-500 text-sm">
        <p>装修支出管家 &copy; 2026 | v2.1.0</p>
      </div>
    </footer>
  </div>
</body>
</html>
